name: Supabase - Apply migrations

on:
  push:
    branches:
      - develop
      - main

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Supabase CLI
        run: npm i -g supabase

      - name: Resolve deploy target
        id: target
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            echo "project_ref=${SUPABASE_PROJECT_REF_DEV}" >> "$GITHUB_OUTPUT"
            echo "db_password=${SUPABASE_DB_PASSWORD_DEV}" >> "$GITHUB_OUTPUT"
            echo "env_name=dev" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "project_ref=${SUPABASE_PROJECT_REF_PROD}" >> "$GITHUB_OUTPUT"
            echo "db_password=${SUPABASE_DB_PASSWORD_PROD}" >> "$GITHUB_OUTPUT"
            echo "env_name=prod" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi
        env:
          SUPABASE_PROJECT_REF_DEV: ${{ secrets.SUPABASE_PROJECT_REF_DEV }}
          SUPABASE_DB_PASSWORD_DEV: ${{ secrets.SUPABASE_DB_PASSWORD_DEV }}
          SUPABASE_PROJECT_REF_PROD: ${{ secrets.SUPABASE_PROJECT_REF_PROD }}
          SUPABASE_DB_PASSWORD_PROD: ${{ secrets.SUPABASE_DB_PASSWORD_PROD }}

      - name: Link Supabase project
        run: supabase link --project-ref "${{ steps.target.outputs.project_ref }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations
        run: supabase db push --password "${{ steps.target.outputs.db_password }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

